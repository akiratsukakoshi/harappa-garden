services:
  ig_scheduler:
    build: .
    container_name: ig_scheduler
    restart: unless-stopped
    ports:
      - "127.0.0.1:8100:8000"
    volumes:
      - scheduler_data:/data
      - ./.env:/app/.env:ro
    env_file: .env
    networks:
      - proxy_net

volumes:
  scheduler_data:

networks:
  proxy_net:
    external: true
    name: proxy-manager_default
