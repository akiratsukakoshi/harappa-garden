version: '3.8'

services:
  mirror-daemon:
    build: .
    container_name: garden-mirror-daemon
    restart: unless-stopped
    user: "1000:1000"               # vps-harappa(host)と一致させ、書き出しファイルを vps-harappa 所有にする(S13 で追加)
    environment:
      COUCHDB_URL: ${COUCHDB_URL:-http://garden-couchdb:5984}
      COUCHDB_USER: ${COUCHDB_USER}
      COUCHDB_PASS: ${COUCHDB_PASS}
      DATABASE: ${DATABASE:-gakuchovault}
      E2EE_PASSPHRASE: ${E2EE_PASSPHRASE}
      MIRROR_DIR: /mirror
      STATE_FILE: /data/state.json
      # S27: vault 外管理パスは CouchDB → fs に展開しない
      EXCLUDE_PREFIXES: ${EXCLUDE_PREFIXES:-garden/board/,garden/log/}
    volumes:
      - ${MIRROR_HOST_PATH}:/mirror
      - ./data:/data
    networks:
      - couchdb
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  couchdb:
    external: true
    name: garden-couchdb_default
